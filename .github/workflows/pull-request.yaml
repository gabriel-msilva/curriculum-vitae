name: Render CV

on:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  render-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Render Rmarkdown
        uses: ./.github/actions/render-rmarkdown
        with:
          file: cv/mle.Rmd