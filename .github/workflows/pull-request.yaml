name: Render CV

on:
  push:
    branches:
      - "**"
      - "!main"

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Render CV
        uses: ./.github/actions/test-and-render
        with:
          file: cv/mle.Rmd
